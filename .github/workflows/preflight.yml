name: Preflight

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  preflight:
    name: Plugin integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run preflight (10 checks)
        run: node scripts/preflight.js

      - name: Unit tests (scoring library)
        run: node tests/run-all.js

      - name: Behavioral test - typo task should route to haiku
        run: |
          OUT=$(echo '{"prompt":"fix typo in README"}' | node scripts/analyze-complexity.js)
          echo "$OUT"
          echo "$OUT" | grep -q "haiku" || {
            echo "FAIL: Expected 'haiku' in routing for typo task"
            exit 1
          }

      - name: Behavioral test - architecture task should route to opus
        run: |
          OUT=$(echo '{"prompt":"redesign authentication architecture across all microservices"}' | node scripts/analyze-complexity.js)
          echo "$OUT"
          echo "$OUT" | grep -q "opus" || {
            echo "FAIL: Expected 'opus' in routing for architecture task"
            exit 1
          }

      - name: Behavioral test - bug fix should route to sonnet
        run: |
          OUT=$(echo '{"prompt":"fix the validation bug in the signup form"}' | node scripts/analyze-complexity.js)
          echo "$OUT"
          echo "$OUT" | grep -q "sonnet" || {
            echo "FAIL: Expected 'sonnet' in routing for bug fix task"
            exit 1
          }

      - name: Behavioral test - performance investigation should route to sonnet
        run: |
          OUT=$(echo '{"prompt":"investigate the performance bottleneck in this handler"}' | node scripts/analyze-complexity.js)
          echo "$OUT"
          echo "$OUT" | grep -q "sonnet" || {
            echo "FAIL: Expected 'sonnet' for performance investigation (performance_debug category)"
            exit 1
          }

      - name: Behavioral test - performance audit should still route to opus
        run: |
          OUT=$(echo '{"prompt":"audit authentication performance across microservices"}' | node scripts/analyze-complexity.js)
          echo "$OUT"
          echo "$OUT" | grep -q "opus" || {
            echo "FAIL: Expected 'opus' for performance audit (performance_audit category)"
            exit 1
          }

      - name: Behavioral test - trace execution should route to sonnet (investigation)
        run: |
          OUT=$(echo '{"prompt":"trace execution of fetchUser and walk me through it"}' | node scripts/analyze-complexity.js)
          echo "$OUT"
          echo "$OUT" | grep -q "sonnet" || {
            echo "FAIL: Expected 'sonnet' for trace execution (investigation category)"
            exit 1
          }

      - name: Verify task-routing.json has at least 28 categories
        run: |
          node -e "
            var r = require('./config/task-routing.json');
            var h = Object.keys(r.models.haiku.categories).length;
            var s = Object.keys(r.models.sonnet.categories).length;
            var o = Object.keys(r.models.opus.categories).length;
            var total = h + s + o;
            console.log('Categories - haiku:', h, 'sonnet:', s, 'opus:', o, 'total:', total);
            // T2.3 (v2.5.0): added performance_debug + investigation (2 new sonnet
            // categories, bringing total to 30). Allow >= 28 to leave room for
            // future /learn-promoted categories without breaking CI.
            if (total < 28) {
              console.error('Expected >= 28 categories, got', total);
              process.exit(1);
            }
          "

      - name: Verify hooks.json references all exist
        run: |
          node -e "
            var fs = require('fs');
            var path = require('path');
            var raw = fs.readFileSync('hooks/hooks.json', 'utf8');
            var refs = (raw.match(/scripts\/[A-Za-z0-9_-]+\.js/g) || []);
            var unique = [];
            refs.forEach(function(r) { if (unique.indexOf(r) === -1) unique.push(r); });
            var missing = unique.filter(function(r) { return !fs.existsSync(r); });
            if (missing.length) {
              console.error('Missing referenced scripts:', missing);
              process.exit(1);
            }
            console.log('All', unique.length, 'hook script references exist');
          "

      - name: Verify bundle is reproducible (dist/install.js sync)
        run: |
          echo "=== Pre-build: committed dist/install.js ==="
          ls -l dist/install.js
          md5sum dist/install.js
          echo
          echo "=== Building install.js fresh ==="
          node scripts/build-installer.js
          echo
          echo "=== Post-build: generated install.js ==="
          ls -l install.js
          md5sum install.js
          echo
          echo "=== Diff size and content ==="
          if [ "$(stat -c%s install.js)" != "$(stat -c%s dist/install.js)" ]; then
            echo "SIZE DIFFERS: generated $(stat -c%s install.js) vs committed $(stat -c%s dist/install.js)"
          fi
          if ! cmp -s install.js dist/install.js; then
            echo ""
            echo "BYTES DIFFER. First 20 differing positions:"
            cmp -l install.js dist/install.js 2>&1 | head -20 || true
            echo ""
            echo "Files that the bundler embedded (first 30, sorted):"
            node -e "
              var FILES = require('./install.js'.replace(/^/, './'));
            " 2>/dev/null || true
            node -e "
              // Re-run collectFiles to introspect
              var fs=require('fs'), path=require('path');
              var content=fs.readFileSync('./install.js','utf8');
              var m=content.match(/var FILES = (\[.*?\]);/);
              if(!m){console.log('Could not parse FILES array');process.exit(0);}
              var files=JSON.parse(m[1]);
              console.log('Embedded:', files.length, 'files');
              files.sort(function(a,b){return a.path.localeCompare(b.path);}).slice(0,30).forEach(function(f){
                var crypto=require('crypto');
                var hash=crypto.createHash('md5').update(f.content).digest('hex').substring(0,8);
                console.log('  ' + hash + '  ' + f.size + 'B  ' + f.path);
              });
            "
            echo ""
            echo "=== HOW TO FIX (if you changed source): ==="
            echo "  node scripts/build-installer.js"
            echo "  cp install.js dist/install.js"
            echo "  git add install.js dist/install.js && git commit"
            exit 1
          fi
          echo "Bundle is in sync with source"

      - name: Verify marketplace.json structure
        run: |
          node -e "
            var m = require('./.claude-plugin/marketplace.json');
            if (!m.name || !m.owner || !m.plugins || !Array.isArray(m.plugins)) {
              console.error('Invalid marketplace.json structure');
              process.exit(1);
            }
            console.log('marketplace.json OK - name:', m.name, '| plugins:', m.plugins.length);
          "

      - name: Verify version sync (plugin.json is the source of truth)
        run: |
          node -e "
            var fs = require('fs');
            var truth = require('./.claude-plugin/plugin.json').version;
            console.log('Source of truth (.claude-plugin/plugin.json):', truth);
            var checks = [
              {
                file: 'package.json',
                actual: require('./package.json').version
              },
              {
                file: '.claude-plugin/marketplace.json (plugins[0].version)',
                actual: require('./.claude-plugin/marketplace.json').plugins[0].version
              },
              {
                // T1.5 (v2.4.1): require the full heading pattern including
                // 'Self-Contained Installer' so a heading rename fails loudly
                // instead of silently matching 'undefined'.
                file: 'dist/README.md heading',
                actual: (fs.readFileSync('./dist/README.md', 'utf8').match(/^# Claude Model Changer v(\d+\.\d+\.\d+) - Self-Contained Installer/m) || ['', 'HEADING_NOT_FOUND'])[1]
              },
              {
                file: 'scripts/install-plugin.js (must NOT hardcode version)',
                actual: 'reads from plugin.json',
                isHardcoded: /var PLUGIN_VERSION = \"\d+\.\d+\.\d+\"/.test(fs.readFileSync('./scripts/install-plugin.js', 'utf8'))
              }
            ];
            var fail = false;
            checks.forEach(function(c) {
              if (c.isHardcoded) {
                console.error('  FAIL ' + c.file + ' - PLUGIN_VERSION is still hardcoded; must read from plugin.json');
                fail = true;
              } else if (c.actual && c.actual !== truth && c.actual !== 'reads from plugin.json') {
                console.error('  FAIL ' + c.file + ' = ' + c.actual + ' (expected ' + truth + ')');
                fail = true;
              } else {
                console.log('  OK   ' + c.file + ' = ' + c.actual);
              }
            });
            if (fail) {
              console.error('');
              console.error('Version mismatch. Update all files to match .claude-plugin/plugin.json (' + truth + ')');
              process.exit(1);
            }
            console.log('All versions in sync');
          "

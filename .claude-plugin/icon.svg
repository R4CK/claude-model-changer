<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e"/>

  <!-- Three stacked "model" rectangles representing haiku/sonnet/opus tiers -->
  <!-- Haiku (small, green, bottom) -->
  <rect x="24" y="82" width="28" height="14" rx="3" fill="#10b981"/>
  <text x="38" y="93" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">H</text>

  <!-- Sonnet (medium, blue, middle) -->
  <rect x="34" y="58" width="44" height="18" rx="3" fill="#3b82f6"/>
  <text x="56" y="71" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">S</text>

  <!-- Opus (large, purple, top) -->
  <rect x="44" y="28" width="60" height="24" rx="3" fill="#8b5cf6"/>
  <text x="74" y="46" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">O</text>

  <!-- Routing arrows connecting them -->
  <path d="M 66 82 L 66 76 M 63 78 L 66 75 L 69 78"
        stroke="#64748b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 82 58 L 82 52 M 79 54 L 82 51 L 85 54"
        stroke="#64748b" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Decision indicator (small dot) -->
  <circle cx="104" cy="24" r="6" fill="#fbbf24"/>
  <text x="104" y="27" font-family="sans-serif" font-size="8" fill="#1a1a2e" text-anchor="middle" font-weight="bold">?</text>
</svg>
